# Source: ai-infra-interview-platform/templates/nats.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: ai-infra-interview-platform-jetstream-bootstrap
  labels:
    app.kubernetes.io/name: ai-infra-interview-platform
    helm.sh/chart: ai-infra-interview-platform-0.1.0
    app.kubernetes.io/instance: ai-interview-mvp
    app.kubernetes.io/managed-by: Helm
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-infra-interview-platform
        app.kubernetes.io/instance: ai-interview-mvp
        app.kubernetes.io/component: jetstream-bootstrap
    spec:
      restartPolicy: OnFailure
      containers:
        - name: nats-bootstrap
          image: "natsio/nats-box:0.16.0"
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
          args:
            - |
              set -eu
              NATS_URL="nats://ai-infra-interview-platform-nats:4222"
              until nats -s "$NATS_URL" stream ls >/dev/null 2>&1; do
                echo "waiting for nats server..."
                sleep 2
              done
              upsert_stream() {
                stream_name="$1"
                subjects="$2"
                retention="$3"
                storage="$4"
                max_age="$5"
                max_bytes="$6"
                replicas="$7"
                if nats -s "$NATS_URL" stream info "$stream_name" >/dev/null 2>&1; then
                  nats -s "$NATS_URL" stream update "$stream_name" \
                    --subjects "$subjects" \
                    --retention "$retention" \
                    --storage "$storage" \
                    --max-age "$max_age" \
                    --max-bytes "$max_bytes" \
                    --replicas "$replicas" \
                    --discard old \
                    --dupe-window 2m \
                    --defaults
                else
                  nats -s "$NATS_URL" stream add "$stream_name" \
                    --subjects "$subjects" \
                    --retention "$retention" \
                    --storage "$storage" \
                    --max-age "$max_age" \
                    --max-bytes "$max_bytes" \
                    --replicas "$replicas" \
                    --discard old \
                    --dupe-window 2m \
                    --defaults
                fi
              }
              upsert_stream "AUDIT_EVENTS" "audit.events.>" "limits" "file" "168h" "120GB" "3"
              upsert_stream "DLQ_INTERVIEW" "dlq.interview.>" "limits" "file" "336h" "20GB" "3"
              upsert_stream "DLQ_EVALUATION" "dlq.evaluation.>" "limits" "file" "336h" "20GB" "3"
              upsert_stream "DLQ_AUDIT" "dlq.audit.>" "limits" "file" "336h" "20GB" "3"
