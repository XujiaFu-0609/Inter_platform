apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-infra-interview-platform-event-pipeline-dashboard
  labels:
    app.kubernetes.io/name: ai-infra-interview-platform
    helm.sh/chart: ai-infra-interview-platform-0.1.0
    app.kubernetes.io/instance: ai-interview-mvp
    app.kubernetes.io/managed-by: Helm
    grafana_dashboard: "1"
data:
  event-pipeline-health.json: |
    {
      "title": "CLOA Event Pipeline Health",
      "schemaVersion": 39,
      "version": 1,
      "editable": true,
      "time": { "from": "now-6h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "发布成功率（5m）",
          "targets": [
            {
              "expr": "100 * sum(rate(cloa_event_publish_total{result=\\\"success\\\"}[5m])) / clamp_min(sum(rate(cloa_event_publish_total[5m])), 1)"
            }
          ]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "消费延迟 P95（秒）",
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(cloa_event_consume_latency_seconds_bucket[5m])) by (le))"
            }
          ]
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "DLQ 增速（条/分钟）",
          "targets": [
            {
              "expr": "60 * sum(rate(cloa_event_dlq_messages_total[5m])) by (domain)"
            }
          ]
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "重试次数（5m）",
          "targets": [
            {
              "expr": "sum(increase(cloa_event_retry_total[5m])) by (domain)"
            }
          ]
        }
      ]
    }
