# Source: ai-infra-interview-platform/templates/event-pipeline-observability.yaml
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: ai-infra-interview-platform-event-pipeline-alerts
  labels:
    app.kubernetes.io/name: ai-infra-interview-platform
    helm.sh/chart: ai-infra-interview-platform-0.1.0
    app.kubernetes.io/instance: ai-interview-mvp
    app.kubernetes.io/managed-by: Helm
spec:
  groups:
    - name: event-pipeline-health
      rules:
        - alert: EventPublishSuccessRateLowWarning
          expr: |
            (
              100 * sum(rate(cloa_event_publish_total{result="success"}[5m]))
              / clamp_min(sum(rate(cloa_event_publish_total[5m])), 1)
            ) < 99
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "事件发布成功率低于 warning 阈值"
            description: "5m 发布成功率低于 99%"
        - alert: EventPublishSuccessRateLowCritical
          expr: |
            (
              100 * sum(rate(cloa_event_publish_total{result="success"}[5m]))
              / clamp_min(sum(rate(cloa_event_publish_total[5m])), 1)
            ) < 95
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "事件发布成功率低于 critical 阈值"
            description: "5m 发布成功率低于 95%"
        - alert: EventConsumeLatencyP95HighWarning
          expr: |
            histogram_quantile(0.95, sum(rate(cloa_event_consume_latency_seconds_bucket[5m])) by (le))
            > 2
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "事件消费延迟 P95 超过 warning 阈值"
            description: "消费延迟 P95 超过 2 秒"
        - alert: EventConsumeLatencyP95HighCritical
          expr: |
            histogram_quantile(0.95, sum(rate(cloa_event_consume_latency_seconds_bucket[5m])) by (le))
            > 5
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "事件消费延迟 P95 超过 critical 阈值"
            description: "消费延迟 P95 超过 5 秒"
        - alert: EventDlqGrowthHighWarning
          expr: |
            60 * sum(rate(cloa_event_dlq_messages_total[5m]))
            > 30
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "DLQ 增速超过 warning 阈值"
            description: "DLQ 增速超过 30 条/分钟"
        - alert: EventDlqGrowthHighCritical
          expr: |
            60 * sum(rate(cloa_event_dlq_messages_total[5m]))
            > 60
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "DLQ 增速超过 critical 阈值"
            description: "DLQ 增速超过 60 条/分钟"
        - alert: EventRetrySpikeWarning
          expr: |
            sum(increase(cloa_event_retry_total[5m]))
            > 120
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "重试次数超过 warning 阈值"
            description: "5 分钟重试次数超过 120"
        - alert: EventRetrySpikeCritical
          expr: |
            sum(increase(cloa_event_retry_total[5m]))
            > 300
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "重试次数超过 critical 阈值"
            description: "5 分钟重试次数超过 300"
