apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-infra-interview-platform-keycloak
  labels:
    app.kubernetes.io/name: ai-infra-interview-platform
    helm.sh/chart: ai-infra-interview-platform-0.1.0
    app.kubernetes.io/instance: ai-interview-mvp
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-infra-interview-platform
      app.kubernetes.io/instance: ai-interview-mvp
      app.kubernetes.io/component: keycloak
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-infra-interview-platform
        app.kubernetes.io/instance: ai-interview-mvp
        app.kubernetes.io/component: keycloak
    spec:
      containers:
        - name: keycloak
          image: "quay.io/keycloak/keycloak:26.1"
          imagePullPolicy: IfNotPresent
          args:
            - start-dev
            - --http-enabled=true
            - --proxy-headers=xforwarded
            - --hostname-strict=false
          env:
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL_HOST
              value: ai-infra-interview-platform-postgres
            - name: KC_DB_URL_PORT
              value: "5432"
            - name: KC_DB_URL_DATABASE
              value: "keycloak"
            - name: KC_DB_USERNAME
              value: "keycloak"
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ai-infra-interview-platform-postgres
                  key: KEYCLOAK_DB_PASSWORD
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: ai-infra-interview-platform-oidc
                  key: KEYCLOAK_ADMIN_USER
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ai-infra-interview-platform-oidc
                  key: KEYCLOAK_ADMIN_PASSWORD
            - name: KC_HOSTNAME
              value: "auth.interview.localhost"
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /realms/master
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
