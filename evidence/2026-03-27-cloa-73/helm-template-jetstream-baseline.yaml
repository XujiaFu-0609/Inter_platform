    helm.sh/chart: ai-infra-interview-platform-0.1.0
    app.kubernetes.io/instance: ai-interview-mvp
    app.kubernetes.io/managed-by: Helm
spec:
  serviceName: ai-infra-interview-platform-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-infra-interview-platform
      app.kubernetes.io/instance: ai-interview-mvp
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-infra-interview-platform
        app.kubernetes.io/instance: ai-interview-mvp
        app.kubernetes.io/component: postgres
    spec:
      containers:
        - name: postgres
          image: "postgres:16"
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: ai-infra-interview-platform-postgres
                  key: POSTGRES_SUPERUSER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ai-infra-interview-platform-postgres
                  key: POSTGRES_SUPERUSER_PASSWORD
            - name: APP_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: ai-infra-interview-platform-postgres
                  key: APP_DB_NAME
            - name: APP_DB_USER
              valueFrom:
                secretKeyRef:
                  name: ai-infra-interview-platform-postgres
                  key: APP_DB_USER
            - name: APP_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ai-infra-interview-platform-postgres
                  key: APP_DB_PASSWORD
            - name: KEYCLOAK_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: ai-infra-interview-platform-postgres
                  key: KEYCLOAK_DB_NAME
            - name: KEYCLOAK_DB_USER
              valueFrom:
                secretKeyRef:
                  name: ai-infra-interview-platform-postgres
                  key: KEYCLOAK_DB_USER
            - name: KEYCLOAK_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ai-infra-interview-platform-postgres
                  key: KEYCLOAK_DB_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: postgres-init
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER"
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: postgres-init
          configMap:
            name: ai-infra-interview-platform-postgres-init
            defaultMode: 0755
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        
        resources:
          requests:
            storage: 20Gi
