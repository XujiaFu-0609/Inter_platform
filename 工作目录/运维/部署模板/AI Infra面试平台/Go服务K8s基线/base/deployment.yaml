apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-interview-go-api
  labels:
    app.kubernetes.io/name: ai-interview-go-api
    app.kubernetes.io/part-of: ai-interview-platform
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-interview-go-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-interview-go-api
        app.kubernetes.io/part-of: ai-interview-platform
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: api
          image: registry.example.com/cloud-native/ai-interview-go-api:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: ai-interview-go-api-config
            - secretRef:
                name: ai-interview-go-api-secret
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /startupz
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 12
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
