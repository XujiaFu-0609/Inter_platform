{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-interview.fullname" . }}-postgres
  labels:
    {{- include "ai-interview.labels" . | nindent 4 }}
spec:
  ports:
    - name: postgres
      port: {{ .Values.postgres.servicePort }}
      targetPort: postgres
  selector:
    {{- include "ai-interview.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "ai-interview.fullname" . }}-postgres
  labels:
    {{- include "ai-interview.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "ai-interview.fullname" . }}-postgres
  replicas: 1
  selector:
    matchLabels:
      {{- include "ai-interview.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        {{- include "ai-interview.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgres
    spec:
      containers:
        - name: postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-interview.fullname" . }}-postgres
                  key: POSTGRES_SUPERUSER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-interview.fullname" . }}-postgres
                  key: POSTGRES_SUPERUSER_PASSWORD
            - name: APP_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-interview.fullname" . }}-postgres
                  key: APP_DB_NAME
            - name: APP_DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-interview.fullname" . }}-postgres
                  key: APP_DB_USER
            - name: APP_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-interview.fullname" . }}-postgres
                  key: APP_DB_PASSWORD
            - name: KEYCLOAK_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-interview.fullname" . }}-postgres
                  key: KEYCLOAK_DB_NAME
            - name: KEYCLOAK_DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-interview.fullname" . }}-postgres
                  key: KEYCLOAK_DB_USER
            - name: KEYCLOAK_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-interview.fullname" . }}-postgres
                  key: KEYCLOAK_DB_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: postgres-init
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER"
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: postgres-init
          configMap:
            name: {{ include "ai-interview.fullname" . }}-postgres-init
            defaultMode: 0755
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- include "ai-interview.storageClassName" . | nindent 8 }}
        resources:
          requests:
            storage: {{ .Values.postgres.storageSize }}
{{- end }}
