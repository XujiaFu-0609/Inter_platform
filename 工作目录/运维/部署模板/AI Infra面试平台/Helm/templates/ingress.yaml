{{- if and .Values.ingress.enabled .Values.web.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "ai-interview.fullname" . }}-web
  labels:
    {{- include "ai-interview.labels" . | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if and .Values.ingress.tls.enabled .Values.ingress.tls.webSecretName }}
  tls:
    - hosts:
        - {{ .Values.global.hosts.web }}
      secretName: {{ .Values.ingress.tls.webSecretName }}
  {{- end }}
  rules:
    - host: {{ .Values.global.hosts.web }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "ai-interview.fullname" . }}-web
                port:
                  number: {{ .Values.web.servicePort }}
---
{{- end }}
{{- if and .Values.ingress.enabled .Values.api.enabled }}
