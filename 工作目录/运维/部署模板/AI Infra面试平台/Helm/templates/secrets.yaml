apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-interview.fullname" . }}-postgres
  labels:
    {{- include "ai-interview.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_SUPERUSER: {{ .Values.postgres.superuser.username | quote }}
  POSTGRES_SUPERUSER_PASSWORD: {{ .Values.postgres.superuser.password | quote }}
  APP_DB_NAME: {{ .Values.postgres.app.database | quote }}
  APP_DB_USER: {{ .Values.postgres.app.username | quote }}
  APP_DB_PASSWORD: {{ .Values.postgres.app.password | quote }}
  KEYCLOAK_DB_NAME: {{ .Values.postgres.keycloak.database | quote }}
  KEYCLOAK_DB_USER: {{ .Values.postgres.keycloak.username | quote }}
  KEYCLOAK_DB_PASSWORD: {{ .Values.postgres.keycloak.password | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-interview.fullname" . }}-minio
  labels:
    {{- include "ai-interview.labels" . | nindent 4 }}
type: Opaque
stringData:
  MINIO_ROOT_USER: {{ .Values.minio.rootUser | quote }}
  MINIO_ROOT_PASSWORD: {{ .Values.minio.rootPassword | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-interview.fullname" . }}-oidc
  labels:
    {{- include "ai-interview.labels" . | nindent 4 }}
type: Opaque
stringData:
  KEYCLOAK_ADMIN_USER: {{ .Values.keycloak.adminUser | quote }}
  KEYCLOAK_ADMIN_PASSWORD: {{ .Values.keycloak.adminPassword | quote }}
  OIDC_CLIENT_ID: {{ ternary .Values.keycloak.clientId .Values.auth.external.clientId (eq .Values.auth.mode "embedded") | quote }}
  OIDC_CLIENT_SECRET: {{ ternary .Values.keycloak.clientSecret .Values.auth.external.clientSecret (eq .Values.auth.mode "embedded") | quote }}
